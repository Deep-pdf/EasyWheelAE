<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EasyWheelAE Bridge Panel</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="panel-container">
    <div class="logo-container">
      <div class="logo-placeholder">
        <svg viewBox="0 0 100 100" class="logo-svg">
          <circle cx="50" cy="50" r="42" fill="none" stroke="var(--accent-color)" stroke-width="6"/>
          <circle cx="50" cy="50" r="24" fill="none" stroke="var(--text-secondary)" stroke-width="3" stroke-dasharray="6,6"/>
          <line x1="50" y1="8" x2="50" y2="92" stroke="var(--text-secondary)" stroke-width="1.5"/>
          <line x1="8" y1="50" x2="92" y2="50" stroke="var(--text-secondary)" stroke-width="1.5"/>
          <circle cx="50" cy="50" r="6" fill="var(--accent-color)"/>
        </svg>
      </div>
    </div>
    <h1 class="main-title">EasyWheelAE</h1>
    <p class="subtitle" id="bridge-status-text">Bridge Initializing...</p>
    <div class="status-badge-container">
      <span class="status-badge status-disconnected" id="status-badge">Disconnected</span>
    </div>
    
    <div class="logs-container">
      <p class="logs-title">System Logs</p>
      <div class="logs-window" id="logs-window"></div>
    </div>
  </div>
  <script src="index.js"></script>
</body>
</html>
